<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
   background-image: url(k.png);
   background-size: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card {
    border-radius: 10px;
    max-height: 100vh;
    overflow-y: auto;
    padding: 20px;
    width: 50vh;
    color: rgb(4, 4, 4);
    
}
</style>
</head>

<body>

<div class="card p-4 shadow" style="width: 400px;">
    <h3 class="text-center mb-3"><i class="fa fa-edit"></i> Register</h3>

    <form id="registerForm">
        <label class="form-label">Fullname</label> <input type="text" class="form-control mb-2" placeholder="e.g John Paul" required>
        <label class="form-label">Email</label> <input type="email" class="form-control mb-2" placeholder="e.g nil@nil.com" required>
         <label class="form-label">Occupation</label> <input type="text" class="form-control mb-2" placeholder="e.g Student" required>
          <div class="mb-2">
                <label class="form-label">Gender</label>
                <select class="form-select" id="type" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                   </select>
            </div>

        <label class="form-label">Password</label> <input type="password" class="form-control mb-2" placeholder="*****" required>
         <label class="form-label">Home Address</label> <input type="text" class="form-control mb-2" placeholder="24, Ph Kooper street" required>
         <label class="form-label">Date of Birth</label> <input type="date" class="form-control mb-2" placeholder="24/04/1999" required>

        <button class="btn btn-primary w-100">Register</button>
    </form>

    <p class="text-center mt-3">
        Already have an account? <a href="login.html">Login</a>
    </p>
    <div class="card-footer"> <a  href="index.html" class="btn btn-primary">Home</a></div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Registered Successfully!");
    window.location.href = "login.html";
});
</script>

</body>
</html>
