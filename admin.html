<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.sidebar {
    height: 100vh;
    background: #212529;
    width: 220px;
    position: fixed;
}
.sidebar a {
    color: #ccc;
    padding: 12px;
    display: block;
    text-decoration: none;
}
.sidebar a:hover {
    background: red;
    color: white;
}
.content {
    margin-left: 220px;
    padding: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
    </i><h4 class="text-center text-white py-3"><i class="fa fa-dashboard"></i>ADMIN</h4>
    <a href="#">Dashboard</a>
    <a href="#">Manage Reports</a>
    <a href="#">Users</a>
     <a href="login 2.html">Logout</a>
</div>

<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Admin Dashboard</h3>

    <div>
        <i class="fa fa-bell"></i> Notifications 
        <span class="badge bg-danger" id="notifCount">0</span>
    </div>
</div>


<div class="row my-4">
    <div class="col-md-3">
        <div class="card p-3 shadow">
            <h6>Total Reports</h6>
            <h3>120</h3>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 shadow">
            <h6>Critical Cases</h6>
            <h3 class="text-danger">20</h3>
        </div>
    </div>
</div>

<div class="card p-3 shadow">
    <h5>All Reports</h5>

  <table class="table table-hover">
   <thead>
    <tr>
        <th>#</th>
        <th>Type</th>
        <th>Location</th>
        <th>Description</th>
        <th>Team</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
</thead>
    <tbody id="adminTable"></tbody>
</table>
</div>

</div>
<script>
   let lastCount = 0;

function loadReports() {
    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    let table = document.getElementById("adminTable");
    let notif = document.getElementById("notifCount");

    table.innerHTML = "";

    // 🔔 Notification logic
    if (reports.length > lastCount) {
        notif.innerText = reports.length - lastCount;
    } else {
        notif.innerText = 0;
    }

    lastCount = reports.length;

    reports.forEach((r, index) => {

        let badgeClass = "bg-warning";
        if (r.status === "Resolved") badgeClass = "bg-success";
        if (r.status === "Critical") badgeClass = "bg-danger";
        if (r.status === "Team on the way") badgeClass = "bg-primary";

        let row = `
        <tr>
            <td>${index + 1}</td>
            <td>${r.type}</td>
            <td>${r.location}</td>
            <td>${r.description}</td>
            <td>${r.team || "Not Assigned"}</td>
            <td><span class="badge ${badgeClass}">${r.status}</span></td>
            <td>${r.date}</td>
            <td>
                <select onchange="assignTeam(${index}, this.value)" class="form-select form-select-sm">
                    <option value="">Assign Team</option>
                    <option>Police</option>
                    <option>Fire Service</option>
                    <option>Medical</option>
                    <option>Security Agency</option>
                </select>

                <button class="btn btn-sm btn-success mt-1" onclick="updateStatus(${index}, 'Resolved')">
                    Resolve
                </button>

                <button class="btn btn-sm btn-danger mt-1" onclick="deleteReport(${index})">
                    Delete
                </button>
            </td>
        </tr>
        `;

        table.innerHTML += row;
    });
}

// 🚓 Assign team
function assignTeam(index, team) {
    if (!team) return;

    let reports = JSON.parse(localStorage.getItem("reports")) || [];

    reports[index].team = team;
    reports[index].status = "Team on the way";

    localStorage.setItem("reports", JSON.stringify(reports));
    loadReports();
}

//  Resolve
function updateStatus(index, status) {
    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    reports[index].status = status;

    localStorage.setItem("reports", JSON.stringify(reports));
    loadReports();
}

//  Delete report
function deleteReport(index) {
    let confirmDelete = confirm("Are you sure you want to delete this report?");
    if (!confirmDelete) return;

    let reports = JSON.parse(localStorage.getItem("reports")) || [];

    reports.splice(index, 1); // remove item

    localStorage.setItem("reports", JSON.stringify(reports));
    loadReports();
}

//  Auto refresh every 10 seconds
loadReports();
setInterval(loadReports, 10000);
</script>
</body>
</html>
