<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background-color: #050528;
            color: white;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: #ccc;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #dc3545;
            color: white;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 10px;
        }

        .badge {
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center py-3 text-danger"><i class="fa fa-warning"></i>SafeReport</h4>

    <a href="#">Dashboard</a>
    <a href="report.html">Report Incident</a>
    <a href="#">My Reports</a>
    <a href="#">Settings</a>
    <a href="index.html">Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOP BAR -->
    <div class=" card-header shadow d-flex justify-content-between align-items-center mb-4 mt-5 bg-secondary text-white">
        <h3>Dashboard</h3>
        <span class="text-muted">Welcome, User</span>
    </div>

    <!-- STATS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Total Reports</h6>
                <h3>12</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Pending</h6>
                <h3 class="text-warning">5</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Resolved</h6>
                <h3 class="text-success">7</h3>
            </div>
        </div>

    </div>

    <!-- REPORT TABLE -->
    <div class="card shadow p-3">
        <h5 class="mb-3">My Reports</h5>

        <div class="table-responsive">
            <table class="table table-hover">

                <thead>
                   <tr>
    <th>#</th>
    <th>Type</th>
    <th>Location</th>
    <th>Team</th>
    <th>Status</th>
    <th>Date</th>
</tr>
                </thead>

                
                   
                   <tbody id="reportTable"></tbody>

            </table>
        </div>
    </div>

</div>

<script>
function loadReports() {
    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    let table = document.getElementById("reportTable");

    table.innerHTML = "";

    reports.forEach((r, i) => {

        let badgeClass = "bg-warning";

        if (r.status === "Resolved") badgeClass = "bg-success";
        else if (r.status === "Critical") badgeClass = "bg-danger";
        else if (r.status === "Team on the way") badgeClass = "bg-primary";

        let row = `
            <tr>
                <td>${i + 1}</td>
                <td>${r.type}</td>
                <td>${r.location}</td>
                <td>${r.team || "Not Assigned"}</td>
                <td><span class="badge ${badgeClass}">${r.status}</span></td>
                <td>${r.date}</td>
            </tr>
        `;

        table.innerHTML += row;
    });
}

loadReports();
setInterval(loadReports, 2000);
</script>


</body>
</html>
