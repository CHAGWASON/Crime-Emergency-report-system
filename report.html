<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
        }

        .form-container {
            max-width: 700px;
            margin: auto;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="fa fa-warning"></i>SafeReport</a>
    </div>
</nav>

<!-- FORM -->
<div class="container form-container">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4"><i class="fa fa-warning"></i> Report an Incident</h3>

        <form id="reportForm">

            <!-- Incident Type -->
            <div class="mb-3">
                <label class="form-label">Incident Type</label>
                <select class="form-select" id="type" required>
                    <option value="">Select</option>
                    <option>Theft</option>
                    <option>Accident</option>
                    <option>Fire Outbreak</option>
                    <option>Rape</option>
                    <option>Earthquake</option>
                    <option>Flood</option>
                    <option>Robbery</option>
                    <option>Assault</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- Location -->
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" id="location" placeholder="Enter location" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="4" required></textarea>
            </div>

            <!-- Priority -->
            <div class="mb-3">
                <label class="form-label">Priority Level</label>
                <select class="form-select" id="priority">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                    <option>Critical</option>
                </select>
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
                <label class="form-label">Upload Evidence (optional)</label>
                <input type="file" class="form-control" id="image">
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-danger w-100">
                Submit Report
            </button>

        </form>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal fade" id="successModal">
    <div class="modal-dialog">
        <div class="modal-content text-center p-4">
            <h4>✅ Report Submitted</h4>
            <p>Your report has been sent successfully.</p>
            <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("reportForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let report = {
        type: document.getElementById("type").value,
        location: document.getElementById("location").value,
        description: document.getElementById("description").value,
        status: "Pending",
        date: new Date().toISOString().split('T')[0]
    };

    let reports = JSON.parse(localStorage.getItem("reports")) || [];
    reports.push(report);

    localStorage.setItem("reports", JSON.stringify(reports));

    alert("Report submitted!");
    window.location.href = "dashboard.html";
});
</script>

</body>
</html>
