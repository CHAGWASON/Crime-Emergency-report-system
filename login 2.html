<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    background-image: url(k.png);
   background-size: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-3"><i class="fa fa-lock"></i>Login</h3>

    <form id="loginForm">
        <input type="email" class="form-control mb-3" placeholder="Email" required>
        <input type="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-danger w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account? <a href="register.html">Register</a>
    </p>
    <div class="card-footer"> <a  href="index.html" class="btn btn-danger">Home</a></div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    window.location.href = "admin.html";
});
</script>

</body>
</html>
